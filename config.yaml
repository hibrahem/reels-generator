paths:
  input_dir: input
  output_dir: output
  work_dir: work
  intro: null
  outro: assets/outro.mp4
  ending_sound: assets/Riser.wav
  logo: null
  font: assets/fonts/Almarai-Bold.ttf
  ffmpeg: vendor/ffmpeg/bin/ffmpeg
transcription:
  backend: faster-whisper
  model_size: large-v3
  device: auto
  compute_type: auto
  language: ar
  beam_size: 5
selection:
  provider: deepseek
  model: deepseek-chat
  base_url: null
  api_key_env: null
  temperature: 0.0
  min_clip_seconds: 15.0
  max_clip_seconds: 90.0
  max_retries: 1
layout:
  mode_b_split_ratio: 0.5
  detection_sample_interval_seconds: 2.0
  default_fallback_crop: right
  presenter_anchor: right
captions:
  font_family: Almarai
  base_font_size: 100
  active_font_size: 105
  base_color: '&H00FFFFFF'
  active_color: '&H0009D6D8'
  position: bottom
  safe_margin_v: 320
  safe_margin_h: 70
  max_words_per_line: 3
  outline: 5
  shadow: 3
  bold: true
  box: false
  box_color: '&H90000000'
  strip_punctuation: true
  reverse_word_order: false
  normalize_english: true
brand:
  logo_position: bottom-right
  logo_opacity: 1.0
  logo_width_ratio: 0.18
output:
  width: 1080
  height: 1920
  video_codec: libx264
  audio_codec: aac
  video_bitrate: 8M
  audio_bitrate: 192k
  faststart: true
